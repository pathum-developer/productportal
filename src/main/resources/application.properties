spring.application.name=productportal

# Required JWT signing secret. Set JWT_SECRET outside source control with at least 64 UTF-8 bytes.
jwt.secret=${JWT_SECRET}
# Short-lived access token lifetime. Authorization is reloaded from the database on every request.
jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:15m}
# Stable issuer value required during token validation.
jwt.issuer=${JWT_ISSUER:Product Portal}

# CORS must be deployment-specific. Set SECURITY_CORS_ALLOWED_ORIGINS to exact frontend origins.
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:}
security.cors.allowed-origin-patterns=${SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:}
security.cors.allowed-methods=${SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
security.cors.allowed-headers=${SECURITY_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With,X-Correlation-ID}
security.cors.exposed-headers=${SECURITY_CORS_EXPOSED_HEADERS:X-Correlation-ID}
security.cors.allow-credentials=${SECURITY_CORS_ALLOW_CREDENTIALS:true}
security.cors.max-age=${SECURITY_CORS_MAX_AGE:1h}

logging.pattern.console=${CONSOLE_LOG_PATTERN:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)}
#logging.level.root=${LOG_LEVEL:INFO}
#logging.level.com.elvencode.productportal=${LOG_LEVEL:DEBUG}
logging.group.portal_error=com.elvencode.productportal.catalog.product,com.elvencode.productportal.catalog.category
logging.level.portal_error=${LOG_LEVEL_ERROR:ERROR}
#logging.file.name=logs/jobportal.log
#logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

# Learning-only login execution trace. Keep disabled outside local debugging.
#auth.login-trace.enabled=true

# Login brute-force protection. Defaults are shown here for operational visibility.
#auth.login-protection.enabled=true
#auth.login-protection.username-max-failed-attempts=5
#auth.login-protection.username-failure-window=15m
#auth.login-protection.username-lock-duration=15m
#auth.login-protection.ip-max-failed-attempts=25
#auth.login-protection.ip-failure-window=15m
#auth.login-protection.ip-lock-duration=15m
# Enable only when the app is deployed behind a trusted reverse proxy that sanitizes forwarded headers.
#auth.login-protection.trust-forwarded-headers=false

# Durable auth sessions. Refresh tokens are opaque and stored only as SHA-256 hashes.
#auth.session.refresh-token-ttl=30d
#auth.session.max-active-sessions-per-user=5

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:productportal}
spring.datasource.username=${DATABASE_USERNAME:productportal}
spring.datasource.password=${DATABASE_PASSWORD:productportal}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.default_batch_fetch_size=${DEFAULT_BATCH_FETCH_SIZE:50}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.jdbc.time_zone=${HIBERNATE_JDBC_TIME_ZONE:UTC}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.liquibase.enabled=${LIQUIBASE_ENABLED:${FLYWAY_ENABLED:true}}
spring.liquibase.change-log=${LIQUIBASE_CHANGE_LOG:classpath:db/changelog/db.changelog-master.yaml}
# Run only production-safe reference data by default. Add "demo" explicitly for local/demo datasets.
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:reference}

#spring.docker.compose.file=jobportal-compose.yml
spring.docker.compose.lifecycle-management=start-and-stop
spring.docker.compose.start.command=up
spring.docker.compose.stop.command=stop

